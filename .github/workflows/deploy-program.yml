name: Deploy Anchor Program

on:
  workflow_dispatch:
    inputs:
      cluster:
        description: "Target Solana cluster"
        required: true
        default: "devnet"
        type: choice
        options:
          - devnet
          - mainnet-beta
      action:
        description: "Action to perform"
        required: true
        default: "build-and-deploy"
        type: choice
        options:
          - build-only
          - build-and-deploy

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-anchor-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-anchor-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 0.30.1
          avm use 0.30.1

      - name: Verify toolchain
        run: |
          solana --version
          anchor --version
          rustc --version

      - name: Configure Solana
        run: |
          solana config set --url https://api.${{ inputs.cluster }}.solana.com
          echo "${{ secrets.DEPLOYER_KEYPAIR_JSON }}" > ~/.config/solana/id.json
          solana address
          solana balance

      - name: Build Anchor program
        run: anchor build

      - name: Sync program keys
        run: |
          echo "Program keypair:"
          anchor keys list
          echo ""
          echo "If the program ID changed, update declare_id!() in lib.rs and Anchor.toml"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anchor-build-${{ inputs.cluster }}
          path: |
            target/deploy/keystone_marketplace.so
            target/deploy/keystone_marketplace-keypair.json
            target/idl/keystone_marketplace.json
          retention-days: 30

      - name: Deploy to ${{ inputs.cluster }}
        if: inputs.action == 'build-and-deploy'
        run: |
          echo "Deploying to ${{ inputs.cluster }}..."
          anchor deploy --provider.cluster ${{ inputs.cluster }}
          echo ""
          echo "Program deployed successfully!"
          anchor keys list

      - name: Upload IDL
        if: inputs.action == 'build-and-deploy'
        continue-on-error: true
        run: |
          PROGRAM_ID=$(anchor keys list | head -1 | awk '{print $NF}')
          echo "Uploading IDL for program: $PROGRAM_ID"
          anchor idl init $PROGRAM_ID \
            --filepath target/idl/keystone_marketplace.json \
            --provider.cluster ${{ inputs.cluster }} || \
          anchor idl upgrade $PROGRAM_ID \
            --filepath target/idl/keystone_marketplace.json \
            --provider.cluster ${{ inputs.cluster }}

      - name: Deployment summary
        if: inputs.action == 'build-and-deploy'
        run: |
          PROGRAM_ID=$(anchor keys list | head -1 | awk '{print $NF}')
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** ${{ inputs.cluster }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Program ID:** $PROGRAM_ID" >> $GITHUB_STEP_SUMMARY
          echo "- **Explorer:** https://explorer.solana.com/address/$PROGRAM_ID?cluster=${{ inputs.cluster }}" >> $GITHUB_STEP_SUMMARY
